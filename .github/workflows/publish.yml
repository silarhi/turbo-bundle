name: 'Publish'

# Publishes @silarhi/turbo to npm when a GitHub Release is published.
# The release tag (e.g. v0.2.0) drives the published version — the workflow
# stamps it into package.json, so you never bump the version by hand.
#
# Security: uses npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN is
# stored. The job proves its identity to npm with a short-lived id-token, so you
# must first register this repo + workflow as a Trusted Publisher on npmjs.com
# (Package settings -> Trusted Publishers). Provenance is attached automatically.

on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write # required for OIDC trusted publishing + provenance

jobs:
    npm:
        name: Publish @silarhi/turbo to npm
        runs-on: ubuntu-latest
        # npm's Trusted Publisher is pinned to this environment, so the OIDC token
        # MUST carry the `environment: release` claim. The environment's required
        # reviewers were removed, so this no longer gates — it only supplies the claim.
        environment: release
        defaults:
            run:
                working-directory: assets
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
                  cache: yarn
                  cache-dependency-path: assets/yarn.lock

            # The release tag is the single source of truth for the version —
            # no manual package.json bump. Both `vX.Y.Z` and `X.Y.Z` tags work.
            - name: Set version from release tag
              run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
              env:
                  TAG: ${{ github.event.release.tag_name }}

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Verify (lint, typecheck, test)
              run: |
                  yarn lint
                  yarn typecheck
                  yarn test

            - name: Build
              run: yarn build

            # Trusted Publishing (OIDC) needs npm >= 11.5.1.
            - name: Upgrade npm
              run: npm install -g npm@latest

            # No NODE_AUTH_TOKEN: npm exchanges the OIDC id-token with the registry.
            # npm versions are immutable, so skip (don't red-fail) if this version
            # is already published — makes re-running a release a safe no-op.
            - name: Publish
              run: |
                  version="$(node -p 'require("./package.json").version')"
                  if npm view "@silarhi/turbo@${version}" version > /dev/null 2>&1; then
                      echo "@silarhi/turbo@${version} is already published — skipping."
                      exit 0
                  fi
                  npm publish --provenance --access public
